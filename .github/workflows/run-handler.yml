name: Run Handler

on:
  workflow_dispatch:
    inputs:
      mode:
        type: string
        default: "FULL"
        description: "Mode of operation (FULL or ONLY_PUBLISH)"

jobs:
  run-handler:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run handler
        run: python main.py --mode ${{ github.event.inputs.mode }} --ai-api-key "${{ secrets.AI_API_KEY }}" --ai-model "${{ secrets.AI_MODEL }}" --telegram-bot-token "${{ secrets.TELEGRAM_BOT_TOKEN }}" --telegram-channel-id "${{ secrets.TELEGRAM_CHANNEL_ID }}" --s3-access-key "${{ secrets.S3_ACCESS_KEY }}" --s3-secret-key "${{ secrets.S3_SECRET_KEY }}"
        env:
          PYTHONPATH: ${{ github.workspace }}/src
      
      - name: Save temp files for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: temporary-execution-files
          path: |
            /tmp/logs/
            /tmp/*.json